services:
  - type: web
    name: girafa-designer-ecommerce
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://girafadesigner.github.io,http://localhost:3000
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SEED_USERNAME
        value: admin@girafa.com
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
