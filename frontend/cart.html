<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho | Girafa Designer</title>
    <link rel="icon" type="image/png" href="../assets/Logo.png" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="./index.html">
          <img src="../assets/Logo.png" alt="Logo Girafa Designer" />
          <strong>Girafa Designer</strong>
        </a>
        <nav class="top-links">
          <a href="./index.html">Produtos</a>
          <a href="./cart.html">Carrinho <span class="badge" id="cartCount">0</span></a>
          <a href="./account.html" id="accountLink">Entrar</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1>Seu Carrinho</h1>
      <table class="cart-table">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Preco</th>
            <th>Quantidade</th>
            <th>Subtotal</th>
            <th>Acoes</th>
          </tr>
        </thead>
        <tbody id="cartBody"></tbody>
      </table>

      <div class="summary">
        <strong id="cartTotal">Total: R$ 0,00</strong>
        <div class="row-actions">
          <button id="checkoutWhatsappBtn" class="accent">Finalizar no WhatsApp</button>
        </div>
      </div>
      <section class="panel" style="margin-top: 12px">
        <h3>Dados para atendimento</h3>
        <p id="customerStatus"></p>
        <div id="authRequiredBox" class="message error" style="display: none">
          Para finalizar o pedido, entre ou crie sua conta.
          <div style="margin-top: 8px">
            <a href="./account.html" class="button accent">Entrar / Cadastrar</a>
          </div>
        </div>
        <div id="customerDataFormWrap" class="form-grid">
          <input id="customerName" type="text" placeholder="Seu nome" />
          <input id="customerPhone" type="text" placeholder="Seu WhatsApp/telefone" />
        </div>
      </section>
      <p id="paymentMessage"></p>
    </main>

    <script src="./js/nav.js"></script>
    <script>window.GD_API_BASE_URL = "https://ecommerce-obzu.onrender.com";</script>
    <script src="./js/api.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/internal-admin.js"></script>
  </body>
</html>
